<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault - New Movies</title>
    <!-- Modern Typography: Outfit as main font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for standard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Full-screen Background that changes per movie -->
    <div class="background-container" id="bg-container">
        <div class="overlay"></div>
    </div>

    <div class="app-container">
        <!-- Top Navigation / Header -->
        <header>
            <div class="logo">
                <span class="badge">NEW</span>
                <span class="logo-text">MOVIE</span>
            </div>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search...">
            </div>
        </header>

        <!-- Main Movie Content (Center Left) -->
        <main>
            <div class="movie-info" id="movie-info">
                <h1 id="m-title" class="skeleton skeleton-text"></h1>
                
                <div class="meta-data">
                    <span class="imdb">IMDb</span>
                    <span id="m-rating" class="skeleton skeleton-text skeleton-small"></span>
                    <span class="dot">•</span>
                    <span id="m-year" class="skeleton skeleton-text skeleton-small"></span>
                    <span class="dot">•</span>
                    <span id="m-duration" class="skeleton skeleton-text skeleton-small"></span>
                    <span class="dot">•</span>
                    <span id="m-genre" class="skeleton skeleton-text skeleton-small"></span>
                </div>
                
                <p id="m-desc" class="description skeleton skeleton-text skeleton-large"></p>
                
                <div class="actions">
                    <button class="nav-btn" id="prev-btn" aria-label="Previous movie">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <button class="nav-btn" id="next-btn" aria-label="Next movie">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </main>

        <!-- Bottom Carousel of Movie Posters -->
        <footer>
            <div class="carousel" id="carousel">
                <!-- Javascript will populate poster items here -->
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

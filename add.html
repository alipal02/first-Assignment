<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Movie - StreamVault</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-container {
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        padding: 40px;
        margin: 0 auto;
        max-width: 600px;
        width: 100%;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: var(--text-muted);
      }
      .form-control {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 12px 15px;
        color: white;
        font-family: inherit;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s;
      }
      .form-control:focus {
        border-color: var(--primary-yellow);
        background: rgba(0, 0, 0, 0.5);
      }
      textarea.form-control {
        resize: vertical;
        min-height: 100px;
      }
      .submit-btn {
        background: var(--primary-yellow);
        color: #000;
        border: none;
        border-radius: 8px;
        padding: 15px;
        width: 100%;
        font-weight: 800;
        font-size: 1.1rem;
        cursor: pointer;
        margin-top: 10px;
        transition: all 0.3s;
        font-family: inherit;
      }
      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(245, 197, 24, 0.4);
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 1.1rem;
        margin-bottom: 20px;
        transition: color 0.3s;
      }
      .back-btn:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <div
      class="background-container"
      id="bg-container"
      style="
        --bg-image: url(&quot;https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80&quot;);
      "
    >
      <div class="overlay"></div>
    </div>

    <div
      class="app-container"
      style="justify-content: flex-start; padding-top: 40px"
    >
      <main style="max-width: 1200px; margin: 0 auto; width: 100%">
        <a href="index.html" class="back-btn"
          ><i class="fa-solid fa-arrow-left"></i> Back to Home</a
        >

        <div class="form-container">
          <h1 style="margin-bottom: 30px; font-weight: 800; font-size: 2.5rem">
            Add New Movie
          </h1>

          <form id="add-movie-form">
            <div class="form-group">
              <label for="title">Movie Title</label>
              <input
                type="text"
                id="title"
                class="form-control"
                required
                placeholder="e.g. Inception"
              />
            </div>

            <div style="display: flex; gap: 20px">
              <div class="form-group" style="flex: 1">
                <label for="rating">Rating (e.g. 8.5)</label>
                <input
                  type="text"
                  id="rating"
                  class="form-control"
                  required
                  placeholder="8.5"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label for="year">Release Year</label>
                <input
                  type="text"
                  id="year"
                  class="form-control"
                  required
                  placeholder="2010"
                />
              </div>
            </div>

            <div style="display: flex; gap: 20px">
              <div class="form-group" style="flex: 1">
                <label for="duration">Duration</label>
                <input
                  type="text"
                  id="duration"
                  class="form-control"
                  required
                  placeholder="2h 28m"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label for="genre">Genre</label>
                <input
                  type="text"
                  id="genre"
                  class="form-control"
                  required
                  placeholder="Action, Sci-Fi"
                />
              </div>
            </div>

            <div class="form-group">
              <label for="poster">Poster Image URL (optional)</label>
              <input
                type="url"
                id="poster"
                class="form-control"
                placeholder="https://example.com/poster.jpg"
              />
            </div>

            <div class="form-group">
              <label for="background">Background Image URL (optional)</label>
              <input
                type="url"
                id="background"
                class="form-control"
                placeholder="https://example.com/bg.jpg"
              />
            </div>

            <div class="form-group">
              <label for="description">Description (Overview)</label>
              <textarea
                id="description"
                class="form-control"
                required
                placeholder="Enter a short synopsis..."
              ></textarea>
            </div>

            <button type="submit" class="submit-btn">ADD MOVIE</button>
          </form>
        </div>
      </main>
    </div>

    <script src="add.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamVault - Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-container" id="bg-container">
      <div class="overlay" style="background: linear-gradient(to right, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0.8) 50%, rgba(0,0,0,0.5) 100%);"></div>
    </div>

    <div class="app-container" style="padding-top: 2rem;">
      <header>
        <a href="index.html" class="logo" style="text-decoration: none; color: white;">
          <span class="badge">BACK</span>
          <span class="logo-text">HOME</span>
        </a>
      </header>

      <main style="max-width: none; width: 100%; align-items: center; padding-top: 20px;">
        <div id="loading" style="text-align:center; padding: 100px;">
           <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color:var(--primary-yellow);"></i>
        </div>

        <div class="details-wrapper" id="details-wrapper" style="display: none;">
            <div class="details-poster">
                <img id="d-poster" src="" alt="Poster" onerror="this.src='https://placehold.co/300x450/1a1a2e/ffffff?text=N/A'" />
            </div>
            <div class="details-content">
                <h1 id="d-title">Loading...</h1>
                <div class="meta-data" id="d-meta"></div>
                <p class="description" id="d-desc"></p>
                <div class="details-actions">
                    <a href="#" class="btn-secondary" id="edit-btn"><i class="fa-solid fa-pen"></i> Edit</a>
                    <button class="btn-danger" id="delete-btn"><i class="fa-solid fa-trash"></i> Delete</button>
                </div>
            </div>
        </div>
      </main>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal-box">
            <h3>Delete Movie?</h3>
            <p>This action cannot be undone. Are you sure you want to permanently delete this movie?</p>
            <div class="modal-actions">
                <button class="modal-btn modal-cancel" id="cancel-delete">Cancel</button>
                <button class="modal-btn modal-confirm" id="confirm-delete">Delete</button>
            </div>
        </div>
    </div>

    <script src="notifications.js"></script>
    <script src="details.js"></script>
  </body>
</html>

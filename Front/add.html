<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamVault - Add Movie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Dark subtle background for forms -->
    <div class="background-container" id="bg-container">
      <div class="overlay" style="background: linear-gradient(to bottom, rgba(5,5,5,0.9), rgba(5,5,5,0.95));"></div>
    </div>

    <div class="app-container" style="padding-top: 1rem;">
      <header>
        <a href="index.html" class="logo" style="text-decoration: none; color: white;">
          <span class="badge">BACK</span>
          <span class="logo-text">STREAMVAULT</span>
        </a>
      </header>

      <main style="max-width: none; align-items: center; padding-top: 40px;">
        <div class="form-container">
          <div class="form-header">
            <h1>Add New Movie</h1>
            <p style="color: var(--text-muted);">Fill in the details to add to StreamVault</p>
          </div>
          
          <form id="add-movie-form">
            <div class="form-group">
              <label for="title">Movie Title *</label>
              <input type="text" id="title" name="title" required placeholder="e.g. Inception">
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="year">Release Year *</label>
                <input type="number" id="year" name="year" required placeholder="2010" min="1900" max="2100">
              </div>
              <div class="form-group">
                <label for="rating">Rating (IMDb)</label>
                <input type="number" id="rating" name="rating" step="0.1" placeholder="8.8" min="0" max="10">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="duration">Duration (mins)</label>
                <input type="number" id="duration" name="duration" placeholder="148" min="1">
              </div>
              <div class="form-group">
                <label for="genres">Genre</label>
                <input type="text" id="genres" name="genres" placeholder="Action, Sci-Fi">
              </div>
            </div>

            <div class="form-group">
              <label for="overview">Description</label>
              <textarea id="overview" name="overview" placeholder="A thief who steals corporate secrets through the use of dream-sharing technology..."></textarea>
            </div>

            <div class="form-group">
              <label for="poster">Poster Image URL</label>
              <input type="url" id="poster" name="poster" placeholder="https://example.com/poster.jpg">
            </div>

            <div class="form-group">
              <label for="background">Background Image URL</label>
              <input type="url" id="background" name="background" placeholder="https://example.com/bg.jpg">
            </div>

            <button type="submit" class="submit-btn">ADD MOVIE</button>
          </form>
        </div>
      </main>
    </div>

    <script src="notifications.js"></script>
    <script src="add.js"></script>
  </body>
</html>

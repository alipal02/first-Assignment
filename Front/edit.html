<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamVault - Edit Movie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-container" id="bg-container">
      <div class="overlay" style="background: linear-gradient(to bottom, rgba(5,5,5,0.9), rgba(5,5,5,0.95));"></div>
    </div>

    <div class="app-container" style="padding-top: 1rem;">
      <header>
        <a href="#" class="logo" style="text-decoration: none; color: white;" id="back-link">
          <span class="badge">BACK</span>
          <span class="logo-text">DETAILS</span>
        </a>
      </header>

      <main style="max-width: none; align-items: center; padding-top: 40px;">
        
        <div id="loading" style="text-align:center; padding: 50px;">
           <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color:var(--primary-yellow);"></i>
        </div>

        <div class="form-container" id="form-container" style="display: none;">
          <div class="form-header">
            <h1>Edit Movie</h1>
            <p style="color: var(--text-muted);">Update information for <strong id="e-title-header">...</strong></p>
          </div>
          
          <form id="edit-movie-form">
            <div class="form-group">
              <label for="title">Movie Title *</label>
              <input type="text" id="title" name="title" required>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="year">Release Year *</label>
                <input type="number" id="year" name="year" required min="1900" max="2100">
              </div>
              <div class="form-group">
                <label for="rating">Rating</label>
                <input type="number" id="rating" name="rating" step="0.1" min="0" max="10">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="duration">Duration (mins)</label>
                <input type="number" id="duration" name="duration" min="1">
              </div>
              <div class="form-group">
                <label for="genres">Genre</label>
                <input type="text" id="genres" name="genres">
              </div>
            </div>

            <div class="form-group">
              <label for="overview">Description</label>
              <textarea id="overview" name="overview"></textarea>
            </div>

            <div class="form-group">
              <label for="poster">Poster Image URL</label>
              <input type="url" id="poster" name="poster">
            </div>

            <div class="form-group">
              <label for="background">Background Image URL</label>
              <input type="url" id="background" name="background">
            </div>

            <button type="submit" class="submit-btn">SAVE CHANGES</button>
          </form>
        </div>
      </main>
    </div>

    <script src="notifications.js"></script>
    <script src="edit.js"></script>
  </body>
</html>
